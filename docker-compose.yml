version: "3.8"
services:
  bridge-default:
    container_name: test-default-bridge
    image: nginx:latest
    ports:
      - "8081:80"
  bridge-custom:
    container_name: test-my-brdige
    image: nginx:alpine
    networks:
      my-bridge:
        ipv4_address: 172.25.0.10
    ports:
      - "8082:80"

  frontend:
    image: nginx:alpine
    container_name: frontend-app
    networks:
      - frontend-net
      - my-bridge
    ports:
      - "8083:80"
